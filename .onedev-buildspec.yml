version: 44
jobs:
- name: Build and Test
  steps:
  - type: CheckoutStep
    name: Checkout
    cloneCredential:
      type: DefaultCredential
    withLfs: false
    withSubmodules: false
    condition: SUCCESSFUL
    optional: false
  - type: CommandStep
    name: Build
    runInContainer: true
    image: golang:1.22
    interpreter:
      type: DefaultInterpreter
      commands: |
        set -e
        echo "=== Go version ==="
        go version
        echo "=== Downloading dependencies ==="
        go mod download
        echo "=== Building ==="
        go build -o tod .
        echo "=== Build successful ==="
        ls -la tod
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  - type: CommandStep
    name: Vet
    runInContainer: true
    image: golang:1.22
    interpreter:
      type: DefaultInterpreter
      commands: |
        set -e
        go mod download
        echo "=== Running go vet ==="
        go vet ./...
        echo "=== Vet passed ==="
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  triggers:
  - type: BranchUpdateTrigger
    branches: main feat/*
    userMatch: anyone
  retryCondition: never
  maxRetries: 0
  retryDelay: 30
  timeout: 1800
